<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MixKit Records - Acceso</title>
    <style>
        body { margin:0; padding:0; font-family:Arial,sans-serif; background:#0a0015; color:white; min-height:100vh; }
        .container { max-width:420px; width:90%; margin:80px auto; background:#1a0033; border:2px solid #ff3366; border-radius:16px; padding:40px; box-shadow:0 0 20px rgba(255,51,102,0.25); }
        h1 { color:#ff3366; text-align:center; font-size:2.5rem; margin-bottom:10px; }
        .subtitle { color:#ccc; text-align:center; margin-bottom:40px; }
        input { width:100%; padding:14px; margin:8px 0 20px; background:#220044; border:1px solid #555; border-radius:8px; color:white; font-size:1rem; }
        button { width:100%; padding:14px; background:#ff3366; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:1.1rem; }
        button:hover { background:#ff4d80; }
        .switch { text-align:center; margin-top:25px; color:#aaa; }
        .switch a { color:#ff99cc; text-decoration:none; }
        .hidden { display:none; }
    </style>
</head>
<body>

<div class="container">
    <h1>MixKit Records</h1>
    <p class="subtitle">Inicia sesión o regístrate</p>

    <!-- Mensaje sesión activa -->
    <div id="yaLogueado" class="hidden" style="text-align:center;">
        <h2>¡Bienvenid@ de nuevo!</h2>
        <p id="saludoUsuario" style="font-size:1.2rem; margin:20px 0;"></p>
        <p style="color:#aaa;">Redirigiendo a la tienda...</p>
    </div>

    <!-- Login -->
    <div id="login">
        <h2 style="text-align:center; margin-bottom:30px;">Iniciar Sesión</h2>
        <form onsubmit="return iniciarSesion()">
            <input type="text" id="login_correo" placeholder="Correo electrónico" required>
            <input type="password" id="login_contra" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
        <div class="switch">
            ¿No tienes cuenta? <a href="#" onclick="mostrarRegistro(); return false;">Regístrate aquí</a>
        </div>
    </div>

    <!-- Registro -->
    <div id="registro" class="hidden">
        <h2 style="text-align:center; margin-bottom:30px;">Crear Cuenta</h2>
        <form onsubmit="return registrar()">
            <input type="text" id="reg_correo" placeholder="Correo electrónico" required>
            <input type="password" id="reg_contra" placeholder="Contraseña (mín 6 caracteres)" required>
            <button type="submit">Registrarme</button>
        </form>
        <div class="switch">
            ¿Ya tienes cuenta? <a href="#" onclick="mostrarLogin(); return false;">Inicia sesión aquí</a>
        </div>
    </div>
</div>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuariosMixKit")) || [];
let sesionActiva = localStorage.getItem("sesionActiva");

function mostrarLogin() {
    document.getElementById("registro").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("yaLogueado").classList.add("hidden");
}

function mostrarRegistro() {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("registro").classList.remove("hidden");
    document.getElementById("yaLogueado").classList.add("hidden");
}

// Si ya hay sesión → redirige automáticamente a la tienda
if (sesionActiva) {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("registro").classList.add("hidden");
    document.getElementById("yaLogueado").classList.remove("hidden");

    let u = JSON.parse(sesionActiva);
    document.getElementById("saludoUsuario").innerText = "Hola, " + u.correo.split("@")[0];

    setTimeout(() => {
        window.location.href = "tienda.html";  // ← Conexión correcta
    }, 1800);
}

function registrar() {
    let correo = document.getElementById("reg_correo").value.trim().toLowerCase();
    let contra = document.getElementById("reg_contra").value;

    if (!correo || !contra) return alert("Completa todos los campos");
    if (contra.length < 6) return alert("La contraseña debe tener al menos 6 caracteres");

    if (usuarios.some(u => u.correo === correo)) return alert("Ese correo ya está registrado");

    usuarios.push({ correo, contra });
    localStorage.setItem("usuariosMixKit", JSON.stringify(usuarios));

    alert("¡Cuenta creada! Ahora inicia sesión.");
    mostrarLogin();
    return false;
}

function iniciarSesion() {
    let correo = document.getElementById("login_correo").value.trim().toLowerCase();
    let contra = document.getElementById("login_contra").value;

    if (!correo || !contra) return alert("Ingresa correo y contraseña");

    let usuario = usuarios.find(u => u.correo === correo && u.contra === contra);

    if (usuario) {
        localStorage.setItem("sesionActiva", JSON.stringify({ correo }));
        alert("¡Inicio de sesión correcto!");
        window.location.href = "tienda.html";  // ← Conexión correcta
    } else {
        alert("Correo o contraseña incorrectos");
    }
    return false;
}
</script>

</body>
</html>

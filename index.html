<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>MixKit Records</title>

<style>
body { margin:0; padding:0; font-family:Arial,sans-serif; background:#0a0015; color:white; min-height:100vh; }

.hidden{display:none}

/* LOGIN */

.container { max-width:420px; width:90%; margin:80px auto; background:#1a0033; border:2px solid #ff3366; border-radius:16px; padding:40px; box-shadow:0 0 20px rgba(255,51,102,0.25); }

input { width:100%; padding:14px; margin:8px 0 20px; background:#220044; border:1px solid #555; border-radius:8px; color:white; font-size:1rem; }

button { cursor:pointer }

.loginbtn { width:100%; padding:14px; background:#ff3366; color:white; border:none; border-radius:8px; font-weight:bold; font-size:1.1rem; }

.switch { text-align:center; margin-top:25px; color:#aaa; }
.switch a { color:#ff99cc; text-decoration:none; }

/* TIENDA */

#tienda{
display:none;
background:#000000 url("MixkitLogo.jfif") center/cover fixed no-repeat;
min-height:100vh;
}

#tienda::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.82);
z-index:-1;
}

header{text-align:center;padding:50px 15px 30px;}

h1{font-size:3.8rem;margin:10px 0 8px;}

.subtitle{color:#ccc;font-size:1.4rem;}

main{max-width:1200px;margin:auto;padding:0 15px 80px;}

.welcome{
background:rgba(12,12,12,0.75);
border:1px solid #3a3a3a;
border-radius:14px;
padding:28px;
text-align:center;
margin:35px auto;
max-width:720px;
position:relative;
}

.logout-btn{
position:absolute;
top:18px;
right:20px;
background:#1c1c1c;
color:#ddd;
border:1px solid #444;
padding:9px 18px;
border-radius:6px;
}

.productos{
display:flex;
flex-wrap:wrap;
gap:28px;
justify-content:center;
}

.card{
width:300px;
background:rgba(10,10,10,0.92);
border:1px solid #2e2e2e;
border-radius:14px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:20px;
text-align:center;
}

.precio{
font-size:1.6rem;
margin:12px 0 18px;
font-weight:bold;
}

.buybtn{
background:white;
color:black;
border:none;
padding:11px 26px;
border-radius:50px;
font-weight:bold;
}

#btn-carrito{
position:fixed;
bottom:35px;
right:35px;
background:white;
color:black;
padding:15px 28px;
border-radius:50px;
font-weight:bold;
display:none;
}

#modal-carrito{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

.modal-box{
background:#080808;
border:2px solid #3a3a3a;
border-radius:16px;
width:92%;
max-width:540px;
padding:32px;
}

.item{
display:flex;
justify-content:space-between;
background:#191919;
padding:14px;
margin:14px 0;
border-radius:10px;
}

.total{
font-size:1.5rem;
text-align:right;
margin:35px 0;
}
</style>

</head>

<body>

<div id="loginArea">

<div class="container">

<h1 style="text-align:center;color:#ff3366">MixKit Records</h1>
<p class="subtitle">Inicia sesión o regístrate</p>

<div id="login">

<h2 style="text-align:center">Iniciar Sesión</h2>

<form onsubmit="return iniciarSesion()">
<input type="email" id="login_correo" placeholder="Correo electrónico" required>
<input type="password" id="login_contra" placeholder="Contraseña" required>
<button class="loginbtn">Entrar</button>
</form>

<div class="switch">
¿No tienes cuenta?
<a href="#" onclick="mostrarRegistro()">Regístrate</a>
</div>

</div>

<div id="registro" class="hidden">

<h2 style="text-align:center">Crear Cuenta</h2>

<form onsubmit="return registrar()">
<input type="email" id="reg_correo" placeholder="Correo electrónico" required>
<input type="password" id="reg_contra" placeholder="Contraseña (mín 6)" required>
<button class="loginbtn">Registrarme</button>
</form>

<div class="switch">
<a href="#" onclick="mostrarLogin()">Iniciar sesión</a>
</div>

</div>

</div>

</div>

<div id="tienda">

<header>
<h1>MixKit Records</h1>
<div class="subtitle">Instrumentos Musicales</div>
</header>

<main>

<div class="welcome">
<button class="logout-btn" onclick="cerrarSesion()">Cerrar sesión</button>
<h2>Bienvenido <span id="usuario"></span> 🎸</h2>
</div>

<div class="productos">

<div class="card">
<img src="https://media.gettyimages.com/id/843711684/photo/electric-and-acoustic-guitar-product-shoot.jpg?s=1024x1024&w=gi&k=20&c=dOVskEzM0DRkzC4Wxe5bSYtzujNcj6Ub9x6KhcHrkQY=">
<div class="card-body">
<h4>Guitarra Eléctrica</h4>
<div class="precio">RD$ 28,500</div>
<button class="buybtn" onclick="agregar('Guitarra Eléctrica',28500)">Añadir al carrito</button>
</div>
</div>

<div class="card">
<img src="https://static.roland.com/assets/images/products/gallery/vad716-sw_front_gal.jpg">
<div class="card-body">
<h4>Batería Acústica</h4>
<div class="precio">RD$ 45,000</div>
<button class="buybtn" onclick="agregar('Batería Acústica',45000)">Añadir al carrito</button>
</div>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/71E7OdikD1L._AC_UF894,1000_QL80_.jpg">
<div class="card-body">
<h4>Teclado 61 teclas</h4>
<div class="precio">RD$ 18,900</div>
<button class="buybtn" onclick="agregar('Teclado 61 teclas',18900)">Añadir al carrito</button>
</div>
</div>

</div>

</main>

<button id="btn-carrito" onclick="mostrarCarrito()">
🛒 Carrito (<span id="contador">0</span>)
</button>

<div id="modal-carrito">
<div class="modal-box">

<h2>Tu Carrito</h2>

<div id="items"></div>

<div class="total" id="total">Total RD$0</div>

<button onclick="vaciar()">Vaciar carrito</button> <button onclick="cerrarCarrito()">Cerrar</button>

</div>
</div>

</div>

<script>

let usuarios = JSON.parse(localStorage.getItem("usuariosMixKit")) || []
let carrito = []

function mostrarLogin(){
document.getElementById("registro").classList.add("hidden")
document.getElementById("login").classList.remove("hidden")
}

function mostrarRegistro(){
document.getElementById("login").classList.add("hidden")
document.getElementById("registro").classList.remove("hidden")
}

function registrar(){

let correo=document.getElementById("reg_correo").value.trim().toLowerCase()
let contra=document.getElementById("reg_contra").value

if(contra.length < 6){
alert("La contraseña debe tener al menos 6 caracteres")
return false
}

if(usuarios.some(u=>u.correo===correo)){
alert("Ese correo ya está registrado")
return false
}

usuarios.push({correo,contra})

localStorage.setItem("usuariosMixKit",JSON.stringify(usuarios))

alert("Cuenta creada correctamente")

mostrarLogin()

return false
}

function iniciarSesion(){

let correo=document.getElementById("login_correo").value.trim().toLowerCase()
let contra=document.getElementById("login_contra").value

let user=usuarios.find(u=>u.correo===correo && u.contra===contra)

if(!user){
alert("Correo o contraseña incorrectos")
return false
}

localStorage.setItem("sesionActiva",JSON.stringify(user))

abrirTienda()

return false
}

function abrirTienda(){

let sesion=JSON.parse(localStorage.getItem("sesionActiva"))

document.getElementById("loginArea").style.display="none"
document.getElementById("tienda").style.display="block"

document.getElementById("usuario").innerText=sesion.correo.split("@")[0]

carrito = JSON.parse(localStorage.getItem("carrito_"+sesion.correo)) || []

actualizarCarrito()
}

function cerrarSesion(){

let sesion=JSON.parse(localStorage.getItem("sesionActiva"))

localStorage.removeItem("sesionActiva")

localStorage.removeItem("carrito_"+sesion.correo)

location.reload()
}

function guardarCarrito(){

let sesion=JSON.parse(localStorage.getItem("sesionActiva"))

localStorage.setItem("carrito_"+sesion.correo,JSON.stringify(carrito))
}

function agregar(nombre,precio){
carrito.push({nombre,precio})
guardarCarrito()
actualizarCarrito()
}

function eliminar(i){
carrito.splice(i,1)
guardarCarrito()
actualizarCarrito()
}

function vaciar(){
carrito=[]
guardarCarrito()
actualizarCarrito()
}

function actualizarCarrito(){

const items=document.getElementById("items")

items.innerHTML=""

let total=0

carrito.forEach((p,i)=>{

total+=p.precio

items.innerHTML+=`
<div class="item">
${p.nombre} RD$${p.precio.toLocaleString()}
<button onclick="eliminar(${i})">X</button>
</div>
`

})

document.getElementById("total").innerText="Total RD$"+total.toLocaleString()

document.getElementById("contador").innerText=carrito.length

document.getElementById("btn-carrito").style.display=carrito.length>0?"block":"none"

}

function mostrarCarrito(){
document.getElementById("modal-carrito").style.display="flex"
}

function cerrarCarrito(){
document.getElementById("modal-carrito").style.display="none"
}

if(localStorage.getItem("sesionActiva")){
abrirTienda()
}

</script>

</body>
</html>
